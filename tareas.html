<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace Inteligente</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f4f4f4; }
        h1 { text-align: center; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input { width: 70%; padding: 10px; }
        button { padding: 10px 15px; }
        ul { list-style: none; padding: 0; }
        li { 
            padding: 12px; 
            margin: 8px 0; 
            background: #fff; 
            border: 1px solid #ddd; 
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .completada { text-decoration: line-through; color: gray; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Workspace Inteligente</h1>
        
        <input type="text" id="inputTarea" placeholder="¿Qué vas a hacer hoy">
        <button id="btnAgregar">Agregar Tarea</button>

        <div style="margin: 15px 0;">
            <button id="filtroTodas">Todas</button>
            <button id="filtroPendientes">Pendientes</button>
            <button id="filtroCompletadas">Completadas</button>
        </div>

        <ul id="listaTareas"></ul>
    </div>

    <script src="tareas.js"></script>
</body>
</html>
